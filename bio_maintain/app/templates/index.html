{% extends 'base.html' %}
{% block content %}
  <div class="container">
    <h2>Medical Machines</h2>
    <table class="machines-table">
      <thead>
        <tr>
          <th>Machine</th>
          <th>Location</th>
          <th>Model</th>
          <th>Status</th>
          <th>Health</th>
          <th>QR</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        {% for m in machines %}
          <tr>
            <td><a href="/machine/{{m.id}}">{{m.name}}</a></td>
            <td>{{m.location}}</td>
            <td>{{m.model}}</td>
            <td>
              <span class="status {% if m.status == 'Active' %}active{% elif m.status == 'Under Maintenance' %}maintenance{% else %}offline{% endif %}">
                {{m.status}}
              </span>
            </td>
            <td>
              <div class="health-bar">
                <div class="health-fill" style="width: {{scores[m.id]}}%; background: {% if scores[m.id] >= 80 %}#28a745{% elif scores[m.id] >= 60 %}#ffc107{% else %}#dc3545{% endif %};"></div>
              </div>
              <span class="health-score">{{scores[m.id]}}%</span>
            </td>
            <td>
              <img src="/machine/{{m.id}}/qr" alt="QR" class="qr-thumb" title="Scan to view machine"/>
            </td>
            <td><a href="/machine/{{m.id}}" class="btn btn-sm">View</a></td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
{% endblock %}
